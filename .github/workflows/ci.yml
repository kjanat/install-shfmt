# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: CI
run-name: ${{ github.workflow }} - ${{ github.event_name }} - ${{ github.ref }}
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }
permissions: { contents: read }

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs: { artifact-id: "${{ steps.upload.outputs.artifact-id }}" }
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - run: bun install --frozen-lockfile
      - run: bun typecheck
      - run: bun run build
      - run: bash test/integration.sh
      - if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: upload
        uses: actions/upload-artifact@v7
        with: { path: dist, retention-days: 1 }

  release:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    if: >-
      github.event_name == 'push'
      && contains(
           github.event.head_commit.message,
           format('{0}Release: ', fromJSON('"\n"'))
         )
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/release
        with: { artifact-id: "${{ needs.ci.outputs.artifact-id }}" }
